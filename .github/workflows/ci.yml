name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
      - release
    tags:               # 1. ZMIANA: Dodajemy nasłuchiwanie na tagi!
      - 'v*'
  pull_request:
    branches:
      - master
      - develop
      - release

jobs:
  # ==========================================
  # 1. CI - TESTY I LINTING
  # (Zadziała i dla zwykłych commitów, i dla tagów)
  # ==========================================
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Testy
        run: PYTHONPATH=. pytest tests/

  # ==========================================
  # 2. CD - BUDOWANIE EXE
  # ==========================================
  cd:
    needs: ci
    # 2. ZMIANA KAGAŃCA: Odpal tylko wtedy, gdy akcję wywołał push TAGA (np. v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Budowanie pliku .exe
        run: pyinstaller --onefile main.py

      # 3. ZMIANA RELEASE'U: Używamy wbudowanej zmiennej z nazwą taga
      - name: Publikacja na GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # github.ref_name przechowuje nazwę wysłanego taga, np. "v1.0.0"
          tag_name: ${{ github.ref_name }}
          name: Wydanie ${{ github.ref_name }}
          files: dist/main.exe
          generate_release_notes: true
