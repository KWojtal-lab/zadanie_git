name: CI/CD Pipeline

# Odpalamy potok po każdym pushu na main, develop i gałęzie release
on:
  push:
    branches:
      - master
      - develop
      - 'release/**'

jobs:
  # ==========================================
  # 1. CI - TESTY I LINTING (Działa wszędzie!)
  # ==========================================
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Testy
        run: PYTHONPATH=. pytest tests/

  # ==========================================
  # 2. CD - BUDOWANIE EXE (Działa TYLKO na main!)
  # ==========================================
  cd:
    needs: ci # 1. Czekamy aż testy przejdą...
    if: github.ref == 'refs/heads/master' # 2. KAGANIEC: Odpal tylko dla gałęzi main!
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Odczytaj wersję z pliku
        id: version_reader
        shell: bash
        run: |
          # Jeśli z jakiegoś powodu nie masz pliku, domyślnie wrzuci 'latest'
          if [ -f version.txt ]; then
            VERSION=$(cat version.txt)
          else
            VERSION="latest"
          fi
          echo "Znaleziona wersja: $VERSION"
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Budowanie pliku .exe
        run: pyinstaller --onefile main.py

      - name: Publikacja na GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Podpinamy zmienną z odczytaną wersją
          tag_name: v${{ steps.version_reader.outputs.app_version }}
          name: Wydanie ${{ steps.version_reader.outputs.app_version }}
          files: dist/main.exe
          generate_release_notes: true
